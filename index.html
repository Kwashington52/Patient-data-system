<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Data System</title>
  <link rel="stylesheet" href="style.css">
</head>

  <div class="container">
    <h1>Patient Data System</h1>

    <form id="patientForm">
      <input type="text" id="name" placeholder="Patient Name" required>
      <input type="number" id="age" placeholder="Age" required>
      <input type="text" id="condition" placeholder="Condition">
      <button type="submit">Add Patient</button>
    </form>
    <h2>Patient List</h2>
  <ul id="patientList"></ul>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Condition</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="patientTable"></tbody>
</table>
    </table>
  </div>

  <script src="script.js"></script>
  <script>
    const form = document.querySelector("form");
    const patientList = document.getElementById("patientList");

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const name = form.querySelectorAll("input")[0].value;
        const age = form.querySelectorAll("input")[1].value;
        const diagnosis = form.querySelectorAll("input")[2].value;

        const li = document.createElement("li");
        li.textContent = "Name: " + name + " | Age: " + age + " | Diagnosis: " + diagnosis;

        patientList.appendChild(li);

        form.reset();
    });
</script>
</body>
</html>
