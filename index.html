<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <head>
    <title>Patient Data System</title>
    <link rel="stylesheet" href="style.css">
</head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Patient Data System</h1>

    <form id="patientForm">
      <input type="text" id="name" placeholder="Patient Name" required>
      <input type="number" id="age" placeholder="Age" required>
      <input type="text" id="condition" placeholder="Condition">
      <button type="submit">Add Patient</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>Condition</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="patientList"></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
